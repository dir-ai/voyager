name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci --no-audit --no-fund
      - run: npm test
      - name: CLI smoke (help renders)
        run: node dist/cli.js --version
